name: Lingo
options:
  bundleIdPrefix: com.lingo
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

targets:
  Lingo:
    type: application
    platform: iOS
    sources:
      - path: Lingo
        type: group
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lingo.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        INFOPLIST_FILE: Lingo/Info.plist
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "Lingo needs microphone access to record your speech for language evaluation."
        SWIFT_VERSION: "5.9"
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: false
